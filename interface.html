<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Football App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 60px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #0078D4;
            color: white;
        }

        button:hover {
            background-color: #005a9e;
        }

        #result {
            margin-top: 30px;
            padding: 20px;
        }

        .card {
            background: white;
            margin: 10px auto;
            padding: 15px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>Hi & Welcome, choose one!</h1>

    <button onclick="getChampions()">
        Champions League
    </button>

    <button onclick="getPremier()">
        Premier League
    </button>

    <div id="result"></div>

    <script>
        function getChampions() {
            fetch("http://51.137.17.249/teams")
                .then(response => response.json())
                .then(data => displayData(data))
                .catch(error => {
                    document.getElementById("result").innerHTML =
                        "<p style='color:red;'>Error fetching data</p>";
                    console.error(error);
                });
        }

        function getPremier() {
            fetch("XYZaddurl")
                .then(response => response.json())
                .then(data => displayData(data))
                .catch(error => {
                    document.getElementById("result").innerHTML =
                        "<p style='color:red;'>Premier League not configured yet</p>";
                });
        }

        function displayData(data) {
            let output = "";

            data.forEach(item => {
                output += `
                    <div class="card">
                        <h3>${item.name}</h3>
                        <p>ID: ${item.id}</p>
                    </div>
                `;
            });

            document.getElementById("result").innerHTML = output;
        }
    </script>

</body>
</html>
